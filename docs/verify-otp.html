<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 18px;
      letter-spacing: 4px;
      text-align: center;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #2563eb;
    }

    .auth-actions {
      margin-top: 22px;
    }

    .secondary-action {
      margin-top: 12px;
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .message-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message-error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .note-text {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Verify OTP</h1>
      <p>
        Enter the 6-digit OTP sent to your selected reset method. The code expires in 2 minutes and can only be used once.
      </p>

      <form id="verifyOtpForm">
        <div class="form-group">
          <label for="otp">OTP Code</label>
          <input type="text" id="otp" name="otp" maxlength="6" placeholder="000000" required />
          <p class="note-text">
            Use the code you received by email or SMS.
          </p>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Verify OTP</button>
        </div>

        <div class="secondary-action">
          <button type="button" class="btn btn-outline" id="resendOtpBtn" style="width: 100%;">Resend OTP</button>
        </div>

        <div id="verifyMessage" class="message-box"></div>
      </form>

      <div class="auth-footer">
        <a href="forgot-password.html">Back to Forgot Password</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-backend.onrender.com/api";
    const verifyOtpForm = document.getElementById("verifyOtpForm");
    const verifyMessage = document.getElementById("verifyMessage");
    const resendOtpBtn = document.getElementById("resendOtpBtn");

    const resetEmail = localStorage.getItem("resetEmail") || "";
    const resetMethod = localStorage.getItem("resetMethod") || "email";

    verifyOtpForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const otp = document.getElementById("otp").value.trim();

      try {
        const response = await fetch(`${API_BASE}/auth/verify-reset-otp`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: resetEmail,
            otp,
            otp_method: resetMethod
          })
        });

        const data = await response.json();

        if (data.success) {
          verifyMessage.className = "message-box message-success";
          verifyMessage.textContent = data.message || "OTP verified successfully.";

          localStorage.setItem("resetOtpVerified", "true");

          setTimeout(() => {
            window.location.href = "reset-password.html";
          }, 1200);
        } else {
          verifyMessage.className = "message-box message-error";
          verifyMessage.textContent = data.message || "Invalid or expired OTP.";
        }
      } catch (error) {
        verifyMessage.className = "message-box message-error";
        verifyMessage.textContent = "Unable to connect to the server.";
      }
    });

    resendOtpBtn.addEventListener("click", async () => {
      try {
        const response = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: resetEmail,
            otp_method: resetMethod
          })
        });

        const data = await response.json();

        if (data.success) {
          verifyMessage.className = "message-box message-success";
          verifyMessage.textContent = data.message || "A new OTP has been sent.";
        } else {
          verifyMessage.className = "message-box message-error";
          verifyMessage.textContent = data.message || "Unable to resend OTP.";
        }
      } catch (error) {
        verifyMessage.className = "message-box message-error";
        verifyMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
