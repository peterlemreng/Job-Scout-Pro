<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jobs - Job Scout Pro</title>
<link rel="stylesheet" href="style.css" />
<style>
.page-header {
background: linear-gradient(135deg, #eff6ff, #ffffff);
padding: 56px 20px 34px;
text-align: center;
}

.page-header h1 {
font-size: 40px;
color: #111827;
margin-bottom: 10px;
}

.page-header p {
color: #6b7280;
max-width: 700px;
margin: 0 auto;
}

.jobs-page {
padding: 40px 20px 60px;
max-width: 1200px;
margin: 0 auto;
}

.search-bar {
display: grid;
grid-template-columns: 1fr 1fr 1fr auto;
gap: 14px;
margin-bottom: 30px;
}

.search-bar input,
.search-bar select {
padding: 12px 14px;
border: 1px solid #d1d5db;
border-radius: 10px;
font-size: 15px;
outline: none;
}

.search-bar {
background: #ffffff;
padding: 16px;
border-radius: 16px;
box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
border: 1px solid #e5e7eb;
}

.search-bar button {
border: none;
cursor: pointer;
}

.jobs-grid-page {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
gap: 20px;
}

.job-card-page {
background: #ffffff;
border-radius: 16px;
padding: 22px;
box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
border: 1px solid #e5e7eb;
transition: 0.2s ease;
}

.job-card-page:hover {
transform: translateY(-3px);
box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
}

.job-card-page h3 {
margin-bottom: 10px;
color: #111827;
}

.job-meta {
color: #6b7280;
font-size: 14px;
margin-bottom: 8px;
}

.job-description {
color: #4b5563;
margin: 12px 0 18px;
font-size: 15px;
}

.badge-featured {
display: inline-block;
margin-bottom: 12px;
background: #dbeafe;
color: #1d4ed8;
padding: 6px 10px;
border-radius: 999px;
font-size: 12px;
font-weight: 700;
}

.empty-box {
text-align: center;
padding: 30px;
background: #fff;
border-radius: 16px;
box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
border: 1px solid #e5e7eb;
transition: 0.2s ease;
color: #6b7280;
}

@media (max-width: 900px) {
.search-bar {
grid-template-columns: 1fr;
}
}
</style>
</head>
<body>
<header class="topbar">
<div class="logo-area">
<img src="assets/logo.Jobscoutphoto.jpg" alt="Job Scout Pro Logo" class="logo" />
<div>
<h1>Job Scout Pro</h1>
<p class="tagline">
Find jobs. Grow faster. Hire smarter.
</p>
</div>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="jobs.html">Jobs</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>      <a href="employer/dashboard.html">Employer Dashboard</a>
<a href="login.html" class="btn btn-outline">Login</a>
</nav>
</header>

<section class="page-header">
<h1>Available Jobs</h1>
<p>
Search and explore real opportunities that match your skills, goals, and career path.
</p>
</section>

<main class="jobs-page">
<div class="search-bar">
<input type="text" id="searchKeyword" placeholder="Search by title or company" />
<input type="text" id="searchLocation" placeholder="Location" />
<select id="searchCategory">
<option value="">All Categories</option>
<option value="Technology">Technology</option>
<option value="Marketing">Marketing</option>
<option value="Design">Design</option>
<option value="Administration">Administration</option>
<option value="Finance">Finance</option>
<option value="Customer Support">Customer Support</option>
</select>
<button class="btn btn-primary" id="searchBtn">Search</button>
</div>

<div id="jobsList" class="jobs-grid-page">
<div class="empty-box">
Loading jobs...
</div>
</div>
</main>

<script>
const API_BASE = "https://job-scout-pro-production.up.railway.app/api";
const jobsList = document.getElementById("jobsList");
const searchBtn = document.getElementById("searchBtn");

async function loadJobs() {
const keyword = document.getElementById("searchKeyword").value.toLowerCase().trim();
const location = document.getElementById("searchLocation").value.toLowerCase().trim();
const category = document.getElementById("searchCategory").value.toLowerCase().trim();

try {
const response = await fetch(`${API_BASE}/jobs`);
const jobs = await response.json();

let filteredJobs = Array.isArray(jobs) ? jobs: [];

filteredJobs = filteredJobs.filter(job => {
const title = (job.title || "").toLowerCase();
const company = (job.company || "").toLowerCase();
const jobLocation = (job.location || "").toLowerCase();
const jobCategory = (job.category || "").toLowerCase();

return (
(!keyword || title.includes(keyword) || company.includes(keyword)) &&
(!location || jobLocation.includes(location)) &&
(!category || jobCategory === category)
);
});

if (filteredJobs.length === 0) {
jobsList.innerHTML = `<div class="empty-box">No jobs found.</div>`;
return;
}

jobsList.innerHTML = filteredJobs.map(job => `
<div class="job-card-page">
${Number(job.is_featured) === 1 ? `<div class="badge-featured">Featured</div>`: ""}
<h3>${job.title || "Untitled Job"}</h3>
<div class="job-meta"><strong>Company:</strong> ${job.company || "N/A"}</div>
<div class="job-meta"><strong>Location:</strong> ${job.location || "N/A"}</div>
<div class="job-meta"><strong>Category:</strong> ${job.category || "General"}</div>
<div class="job-meta"><strong>Type:</strong> ${job.job_type || "N/A"}</div>
<p class="job-description">${job.description ? job.description.slice(0, 140) + "...": "No description available."}</p>
<a class="btn btn-primary" href="job-detail.html?id=${job.id || ""}">View Details</a>
</div>
`).join("");
} catch (error) {
jobsList.innerHTML = `<div class="empty-box">Failed to load jobs.</div>`;
}
}

searchBtn.addEventListener("click", loadJobs);
document.addEventListener("DOMContentLoaded", loadJobs);
</script>
</body>
</html>
