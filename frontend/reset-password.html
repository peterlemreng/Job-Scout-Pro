<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    .input-group input:focus {
      border-color: #2563eb;
    }

    .toggle-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #555;
    }

    .auth-actions {
      margin-top: 22px;
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-primary {
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
    }

    .message-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message-error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Reset Password</h1>
      <p>
        Enter your new password below. Choose something secure and easy for you to remember.
      </p>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-group">
            <input type="password" id="newPassword" name="newPassword" required />
            <i class="fa-solid fa-eye toggle-icon" id="toggleNewPassword"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-group">
            <input type="password" id="confirmPassword" name="confirmPassword" required />
            <i class="fa-solid fa-eye toggle-icon" id="toggleConfirmPassword"></i>
          </div>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
        </div>

        <div id="resetMessage" class="message-box"></div>
      </form>

      <div class="auth-footer">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-production.up.railway.app/api";
    const resetPasswordForm = document.getElementById("resetPasswordForm");
    const resetMessage = document.getElementById("resetMessage");

    const resetEmail = localStorage.getItem("resetEmail") || "";
    const resetMethod = localStorage.getItem("resetMethod") || "email";
    const resetOtpVerified = localStorage.getItem("resetOtpVerified");

    const toggleNewPassword = document.getElementById("toggleNewPassword");
    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");

    toggleNewPassword.addEventListener("click", function () {
      const isPassword = newPassword.type === "password";
      newPassword.type = isPassword ? "text" : "password";
      this.classList.toggle("fa-eye");
      this.classList.toggle("fa-eye-slash");
    });

    toggleConfirmPassword.addEventListener("click", function () {
      const isPassword = confirmPassword.type === "password";
      confirmPassword.type = isPassword ? "text" : "password";
      this.classList.toggle("fa-eye");
      this.classList.toggle("fa-eye-slash");
    });

    if (resetOtpVerified !== "true") {
      window.location.href = "forgot-password.html";
    }

    resetPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (password.length < 6) {
        resetMessage.className = "message-box message-error";
        resetMessage.textContent = "Password must be at least 6 characters.";
        return;
      }

      if (password !== confirm) {
        resetMessage.className = "message-box message-error";
        resetMessage.textContent = "Passwords do not match.";
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/reset-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: resetEmail,
            otp: localStorage.getItem("resetOtp") || "",
            new_password: password
          })
        });

        const data = await response.json();

        if (data.success) {
          resetMessage.className = "message-box message-success";
          resetMessage.textContent = data.message || "Password reset successful.";

          localStorage.removeItem("resetOtpVerified");
          localStorage.removeItem("resetEmail");
          localStorage.removeItem("resetMethod");

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        } else {
          resetMessage.className = "message-box message-error";
          resetMessage.textContent = data.message || "Unable to reset password.";
        }
      } catch (error) {
        resetMessage.className = "message-box message-error";
        resetMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
