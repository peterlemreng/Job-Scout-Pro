<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
    }

    .auth-card h1 {
      margin: 0 0 10px;
      color: #111827;
      text-align: center;
    }

    .auth-card p {
      text-align: center;
      color: #6b7280;
      margin: 0 0 22px;
    }

    .form-group {
      margin-bottom: 18px;
      width: 100%;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
    }

    .text-input {
      display: block;
      width: 100%;
      height: 44px;
      margin: 0;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #ffffff;
    }

    .text-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .password-wrap {
      display: flex;
      align-items: center;
      width: 100%;
      height: 44px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    .password-wrap:focus-within {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .password-wrap input {
      flex: 1;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 12px 14px;
      border: none;
      outline: none;
      font-size: 14px;
      background: transparent;
    }

    .toggle-btn {
      width: 48px;
      height: 100%;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toggle-btn i {
      font-size: 16px;
      line-height: 1;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .auth-links {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .auth-links a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .message-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .message-error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Login</h1>
      <p>Welcome back. Sign in to continue to Job Scout Pro.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" class="text-input" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" required />
            <button type="button" class="toggle-btn" id="togglePassword">
              <i class="fa-solid fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn">Login</button>

        <div id="loginMessage" class="message-box"></div>

        <div class="auth-links" style="margin-top: 16px;">
          <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <div class="auth-links" style="margin-top: 10px;">
          Don’t have an account? <a href="signup.html">Register</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-production.up.railway.app/api";

    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const togglePassword = document.getElementById("togglePassword");
    const toggleIcon = document.getElementById("toggleIcon");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", function () {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      toggleIcon.classList.toggle("fa-eye");
      toggleIcon.classList.toggle("fa-eye-slash");
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        email: document.getElementById("email").value.trim(),
        password: passwordInput.value.trim()
      };

      loginMessage.className = "message-box";
      loginMessage.textContent = "";

      try {
        const response = await fetch(API_BASE + "/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success) {
          loginMessage.className = "message-box message-success";
          loginMessage.textContent = data.message || "Login successful.";
          localStorage.setItem("user", JSON.stringify(data.user || {}));
          setTimeout(() => {
            window.location.href = "jobs.html";
          }, 1000);
        } else {
          loginMessage.className = "message-box message-error";
          loginMessage.textContent = data.message || "Invalid login details.";
        }
      } catch (error) {
        loginMessage.className = "message-box message-error";
        loginMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
