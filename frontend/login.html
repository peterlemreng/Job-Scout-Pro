<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #2563eb;
    }

    .input-group {
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    .toggle-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #555;
    }

    .auth-actions {
      margin-top: 20px;
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      font-weight: 600;
    }

    .message-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message-error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p>Login to access your Job Scout Pro account.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <input type="password" id="password" name="password" required />
            <i class="fa-solid fa-eye toggle-icon" id="togglePassword"></i>
          </div>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </div>

        <div id="loginMessage" class="message-box"></div>
      </form>

      <div class="auth-footer">
        Don’t have an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-backend.onrender.com/api";
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");

    const toggle = document.getElementById("togglePassword");
    const password = document.getElementById("password");

    toggle.addEventListener("click", function () {
      const isPassword = password.type === "password";
      password.type = isPassword ? "text" : "password";
      this.classList.toggle("fa-eye");
      this.classList.toggle("fa-eye-slash");
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const passwordValue = document.getElementById("password").value.trim();

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            password: passwordValue
          })
        });

        const data = await response.json();

        if (data.success) {
          loginMessage.className = "message-box message-success";
          loginMessage.textContent = "Login successful.";

          localStorage.setItem("jobScoutToken", data.token || "");
          localStorage.setItem("jobScoutUser", JSON.stringify(data.user || {}));

          setTimeout(() => {
            if (data.user && data.user.role === "admin") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "index.html";
            }
          }, 1000);
        } else {
          loginMessage.className = "message-box message-error";
          loginMessage.textContent = data.message || "Invalid login details.";
        }
      } catch (error) {
        loginMessage.className = "message-box message-error";
        loginMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
