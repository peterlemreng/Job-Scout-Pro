<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #111827;
      text-align: center;
    }

    .auth-card p {
      text-align: center;
      color: #6b7280;
      margin-bottom: 22px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
    }

    .form-group input {
      width: 100%;
      max-width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .password-wrap {
      display: flex;
      align-items: center;
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    .password-wrap input {
      flex: 1;
      width: 100%;
      max-width: 100%;
      border: none;
      outline: none;
      padding: 12px 14px;
      font-size: 14px;
      box-shadow: none;
    }

    .password-wrap input:focus {
      border: none;
      box-shadow: none;
    }

    .toggle-btn {
      border: none;
      background: transparent;
      padding: 0 14px;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-btn i {
      font-size: 16px;
      line-height: 1;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .auth-links {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .auth-links a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .message-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .message-error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p>Create your account and start exploring opportunities with Job Scout Pro.</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" required />
            <button type="button" class="toggle-btn" id="togglePassword">
              <i class="fa-solid fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn">Create Account</button>

        <div id="signupMessage" class="message-box"></div>

        <div class="auth-links" style="margin-top: 16px;">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-production.up.railway.app/api";

    const signupForm = document.getElementById("signupForm");
    const signupMessage = document.getElementById("signupMessage");
    const togglePassword = document.getElementById("togglePassword");
    const toggleIcon = document.getElementById("toggleIcon");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", function () {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      toggleIcon.classList.toggle("fa-eye");
      toggleIcon.classList.toggle("fa-eye-slash");
    });

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        full_name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: passwordInput.value.trim()
      };

      signupMessage.className = "message-box";
      signupMessage.textContent = "";

      try {
        const response = await fetch(API_BASE + "/auth/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success) {
          signupMessage.className = "message-box message-success";
          signupMessage.textContent = data.message || "Account created successfully.";

          signupForm.reset();
          passwordInput.type = "password";
          toggleIcon.classList.remove("fa-eye-slash");
          toggleIcon.classList.add("fa-eye");

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1200);
        } else {
          signupMessage.className = "message-box message-error";
          signupMessage.textContent = data.message || "Signup failed.";
        }
      } catch (error) {
        signupMessage.className = "message-box message-error";
        signupMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
