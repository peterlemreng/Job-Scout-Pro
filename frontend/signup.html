<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input[type="text"],
    .form-group input[type="email"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #2563eb;
    }

    .show-password-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 14px;
      color: #374151;
    }

    .show-password-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .show-password-row label {
      margin: 0;
      font-weight: 500;
      cursor: pointer;
    }

    .auth-actions {
      margin-top: 20px;
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      font-weight: 600;
    }

    .message-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message-error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Your Account</h1>
      <p>Register on Job Scout Pro to discover jobs and opportunities.</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
          <div class="show-password-row">
            <input type="checkbox" id="showSignupPassword" />
            <label for="showSignupPassword">Show password</label>
          </div>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </div>

        <div id="signupMessage" class="message-box"></div>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-backend.onrender.com/api";
    const signupForm = document.getElementById("signupForm");
    const signupMessage = document.getElementById("signupMessage");
    const signupPasswordInput = document.getElementById("password");
    const showSignupPassword = document.getElementById("showSignupPassword");

    showSignupPassword.addEventListener("change", () => {
      signupPasswordInput.type = showSignupPassword.checked ? "text" : "password";
    });

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const full_name = document.getElementById("full_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const response = await fetch(`${API_BASE}/auth/signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            full_name,
            email,
            phone,
            password
          })
        });

        const data = await response.json();

        if (data.success) {
          signupMessage.className = "message-box message-success";
          signupMessage.textContent = "Account created successfully. You can now log in.";
          signupForm.reset();
          showSignupPassword.checked = false;
          signupPasswordInput.type = "password";
        } else {
          signupMessage.className = "message-box message-error";
          signupMessage.textContent = data.message || "Signup failed";
        }
      } catch (error) {
        signupMessage.className = "message-box message-error";
        signupMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
