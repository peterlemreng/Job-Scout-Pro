<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .payment-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }    .payment-card {
      width: 100%;
      max-width: 700px;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }    .payment-card h1 {
      margin-bottom: 10px;
      color: #111827;
    }    .payment-card p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 14px;
      margin-top: 20px;
    }    .plan-options,
    .method-options {
      display: grid;
      gap: 14px;
    }    .option-box {
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 16px;
      background: #f9fafb;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
    }    .option-box input {
      margin-top: 4px;
      transform: scale(1.1);
    }    .option-content h3 {
      margin: 0 0 6px 0;
      color: #111827;
      font-size: 16px;
    }    .option-content p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }    .premium-badge {
      display: inline-block;
      background: #f59e0b;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 999px;
      margin-left: 8px;
      vertical-align: middle;
    }    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 10px;
    }    .form-group {
      display: flex;
      flex-direction: column;
    }    .form-group.full-width {
      grid-column: 1 / -1;
    }    .form-group label {
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }    .form-group input,
    .form-group textarea {
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }    .form-group textarea {
      resize: vertical;
      min-height: 90px;
    }    .summary-box {
      margin-top: 22px;
      padding: 18px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }    .summary-box h3 {
      margin: 0 0 12px 0;
      color: #1d4ed8;
      font-size: 17px;
    }    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #374151;
      font-size: 15px;
      gap: 12px;
    }    .summary-row.total {
      font-weight: 700;
      color: #111827;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #bfdbfe;
    }    .payment-actions {
      margin-top: 24px;
    }    .payment-actions button {
      width: 100%;
    }    .message-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }    .message-success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }    .message-error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }    .back-link {
      margin-top: 18px;
      text-align: center;
    }    .back-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }      .payment-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="payment-page">
    <div class="payment-card">
      <h1>Complete Payment</h1>
      <p>Choose your job posting plan and preferred payment method to publish your job on Job Scout Pro.</p>      <form id="paymentForm">
        <div class="section-title">Choose Posting Plan</div>        <div class="plan-options">
          <label class="option-box">
            <input type="radio" name="plan_type" value="standard" checked />
            <div class="option-content">
              <h3>Standard Job Post — KSh 170</h3>
              <p>Normal listing on the jobs page for one job opening.</p>
            </div>
          </label>          <label class="option-box">
            <input type="radio" name="plan_type" value="premium" />
            <div class="option-content">
              <h3>Premium Job Post — KSh 370 <span class="premium-badge">PREMIUM</span></h3>
              <p>Highlighted listing with better visibility and priority placement.</p>
            </div>
          </label>
        </div>        <div class="section-title">Choose Payment Method</div>        <div class="method-options">
          <label class="option-box">
            <input type="radio" name="payment_method" value="mpesa" checked />
            <div class="option-content">
              <h3>M-Pesa</h3>
              <p>Best for local payments using mobile money.</p>
            </div>
          </label>          <label class="option-box">
            <input type="radio" name="payment_method" value="card" />
            <div class="option-content">
              <h3>Card Payment</h3>
              <p>Pay using Visa or Mastercard.</p>
            </div>
          </label>          <label class="option-box">
            <input type="radio" name="payment_method" value="paypal" />
            <div class="option-content">
              <h3>PayPal</h3>
              <p>Good for international users and PayPal account holders.</p>
            </div>
          </label>
        </div>        <div class="section-title">Payer Details</div>        <div class="form-grid">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" required />
          </div>          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required />
          </div>          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="e.g. 0723479577 or +254723479577" required />
          </div>          <div class="form-group">
            <label for="transactionCode">Transaction Code / Reference</label>
            <input type="text" id="transactionCode" placeholder="Optional for now" />
          </div>          <div class="form-group full-width">
            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" placeholder="Add any short note if needed"></textarea>
          </div>
        </div>        <div class="summary-box">
          <h3>Payment Summary</h3>
          <div class="summary-row">
            <span>Selected Plan:</span>
            <span id="selectedPlan">Standard Job Post</span>
          </div>
          <div class="summary-row">
            <span>Payment Method:</span>
            <span id="selectedMethod">M-Pesa</span>
          </div>
          <div class="summary-row">
            <span>Currency:</span>
            <span id="selectedCurrency">KES</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span id="selectedAmount">KSh 170</span>
          </div>
        </div>        <div class="payment-actions">
          <button type="submit" class="btn btn-primary">Pay Now</button>
        </div>        <div id="paymentMessage" class="message-box"></div>
      </form>      <div class="back-link">
        <a href="jobs.html">Back to Jobs</a>
      </div>
    </div>
  </div>  <script>
    const API_BASE = "https://job-scout-pro-production.up.railway.app/api";    const paymentForm = document.getElementById("paymentForm");
    const paymentMessage = document.getElementById("paymentMessage");    const selectedPlan = document.getElementById("selectedPlan");
    const selectedMethod = document.getElementById("selectedMethod");
    const selectedCurrency = document.getElementById("selectedCurrency");
    const selectedAmount = document.getElementById("selectedAmount");    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const phoneInput = document.getElementById("phone");
    const transactionCodeInput = document.getElementById("transactionCode");
    const notesInput = document.getElementById("notes");    const planPrices = {
      standard: 170,
      premium: 370
    };    const planLabels = {
      standard: "Standard Job Post",
      premium: "Premium Job Post"
    };    const methodLabels = {
      mpesa: "M-Pesa",
      card: "Card Payment",
      paypal: "PayPal"
    };    function getCurrency(paymentMethod) {
      if (paymentMethod === "paypal") {
        return "USD";
      }
      return "KES";
    }    function getDisplayedAmount(planType, paymentMethod) {
      if (paymentMethod === "paypal") {
        const usdAmount = planType === "premium" ? 2.87 : 1.32;
        return "$" + usdAmount.toFixed(2);
      }
      return "KSh " + planPrices[planType];
    }    function updateSummary() {
      const planType = document.querySelector('input[name="plan_type"]:checked').value;
      const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;      selectedPlan.textContent = planLabels[planType];
      selectedMethod.textContent = methodLabels[paymentMethod];
      selectedCurrency.textContent = getCurrency(paymentMethod);
      selectedAmount.textContent = getDisplayedAmount(planType, paymentMethod);
    }    document.querySelectorAll('input[name="plan_type"]').forEach((input) => {
      input.addEventListener("change", updateSummary);
    });    document.querySelectorAll('input[name="payment_method"]').forEach((input) => {
      input.addEventListener("change", updateSummary);
    });    paymentForm.addEventListener("submit", async (e) => {
      e.preventDefault();      const planType = document.querySelector('input[name="plan_type"]:checked').value;
      const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;      const payload = {
        full_name: fullNameInput.value.trim(),
        email: emailInput.value.trim(),
        phone: phoneInput.value.trim(),
        amount: planPrices[planType],
        currency: getCurrency(paymentMethod),
        payment_method: paymentMethod,
        payment_for: planLabels[planType],
        transaction_code: transactionCodeInput.value.trim(),
        finalStatus: "pending",
        notes: notesInput.value.trim()
      };      paymentMessage.className = "message-box";
      paymentMessage.textContent = "";      try {
        const response = await fetch(API_BASE + "/payments/create", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });        const data = await response.json();        if (data.success) {
          paymentMessage.className = "message-box message-success";
          paymentMessage.textContent = "Payment request saved successfully. Next, we can connect real M-Pesa, card, and PayPal processing.";
          paymentForm.reset();
          updateSummary();
        } else {
          paymentMessage.className = "message-box message-error";
          paymentMessage.textContent = data.message || "Failed to save payment.";
        }
      } catch (error) {
        paymentMessage.className = "message-box message-error";
        paymentMessage.textContent = "Unable to connect to the server.";
      }
    });    updateSummary();
  </script>
</body>
</html>
