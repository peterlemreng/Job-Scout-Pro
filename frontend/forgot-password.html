<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Job Scout Pro</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #111827;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #2563eb;
    }

    .method-box {
      margin-top: 8px;
      display: grid;
      gap: 12px;
    }

    .method-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #f9fafb;
    }

    .method-option input {
      transform: scale(1.1);
    }

    .method-option label {
      margin: 0;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
    }

    .auth-actions {
      margin-top: 22px;
    }

    .auth-footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-primary {
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
    }

    .message-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-size: 14px;
    }

    .message-success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message-error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .note-text {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Forgot Password</h1>
      <p>
        Enter your account email address and choose where you want to receive your 6-digit OTP code securely.
      </p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label>Choose OTP delivery method</label>
          <div class="method-box">
            <div class="method-option">
              <input type="radio" id="methodEmail" name="otp_method" value="email" checked />
              <label for="methodEmail">Send OTP to my email</label>
            </div>

            <div class="method-option">
              <input type="radio" id="methodSms" name="otp_method" value="sms" />
              <label for="methodSms">Send OTP to my registered phone number by SMS</label>
            </div>
          </div>
          <p class="note-text">
            The OTP will expire in 2 minutes and can only be used once.
          </p>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Send OTP</button>
        </div>

        <div id="forgotMessage" class="message-box"></div>
      </form>

      <div class="auth-footer">
        Remembered your password? <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://job-scout-pro-production.up.railway.app/api";
    const forgotPasswordForm = document.getElementById("forgotPasswordForm");
    const forgotMessage = document.getElementById("forgotMessage");

    forgotPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const otpMethod = document.querySelector('input[name="otp_method"]:checked').value;

      try {
        const response = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            otp_method: otpMethod
          })
        });

        const data = await response.json();

        if (data.success) {
          forgotMessage.className = "message-box message-success";
          forgotMessage.textContent = data.message || "OTP sent successfully.";

          localStorage.setItem("resetEmail", email);
          localStorage.setItem("resetMethod", otpMethod);

          setTimeout(() => {
            window.location.href = "verify-otp.html";
          }, 1200);
        } else {
          forgotMessage.className = "message-box message-error";
          forgotMessage.textContent = data.message || "Unable to send OTP.";
        }
      } catch (error) {
        forgotMessage.className = "message-box message-error";
        forgotMessage.textContent = "Unable to connect to the server.";
      }
    });
  </script>
</body>
</html>
