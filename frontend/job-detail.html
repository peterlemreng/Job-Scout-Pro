<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Details - Job Scout Pro</title>
<link rel="stylesheet" href="style.css" />
<style>
.detail-wrapper {
max-width: 900px;
margin: 40px auto;
padding: 20px;
}

.detail-card {
background: #ffffff;
border-radius: 18px;
padding: 30px;
box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
}

.detail-card h1 {
font-size: 34px;
margin-bottom: 12px;
color: #111827;
}

.detail-meta {
color: #6b7280;
margin-bottom: 10px;
font-size: 15px;
}

.detail-section {
margin-top: 24px;
}

.detail-section h3 {
margin-bottom: 10px;
color: #1f2937;
}

.action-row {
display: flex;
gap: 14px;
flex-wrap: wrap;
margin-top: 28px;
}

.info-box {
margin-top: 20px;
padding: 14px;
border-radius: 12px;
background: #eff6ff;
color: #1d4ed8;
font-size: 14px;
}

.counter-boxes {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 16px;
margin-top: 24px;
}

.counter-card {
background: #f9fafb;
padding: 18px;
border-radius: 14px;
text-align: center;
border: 1px solid #e5e7eb;
}

.counter-card h3 {
font-size: 26px;
color: #2563eb;
margin-bottom: 6px;
}

@media (max-width: 700px) {
.counter-boxes {
grid-template-columns: 1fr;
}
}
</style>
</head>
<body>
<header class="topbar">
<div class="logo-area">
<img src="assets/logo.Jobscoutphoto.jpg" alt="Job Scout Pro Logo" class="logo" />
<div>
<h1>Job Scout Pro</h1>
<p class="tagline">
Find jobs. Grow faster. Hire smarter.
</p>
</div>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="jobs.html">Jobs</a>
<a href="contact.html">Contact</a>
<a href="login.html" class="btn btn-outline">Login</a>
</nav>
</header>

<main class="detail-wrapper">
<div id="jobDetail" class="detail-card">
<p>
Loading job details...
</p>
</div>
</main>

<script>
const API_BASE = "https://job-scout-pro-backend.onrender.com/api";
const jobDetail = document.getElementById("jobDetail");

function getJobId() {
const params = new URLSearchParams(window.location.search);
return params.get("id");
}

async function loadJobDetail() {
const jobId = getJobId();

if (!jobId) {
jobDetail.innerHTML = `<p>No job selected.</p>`;
return;
}

try {
const response = await fetch(`${API_BASE}/jobs`);
const jobs = await response.json();

const job = Array.isArray(jobs)
? jobs.find(item => String(item.id) === String(jobId)): null;

if (!job) {
jobDetail.innerHTML = `<p>Job not found.</p>`;
return;
}

jobDetail.innerHTML = `
<h1>${job.title || "Untitled Job"}</h1>
<div class="detail-meta"><strong>Company:</strong> ${job.company || "N/A"}</div>
<div class="detail-meta"><strong>Location:</strong> ${job.location || "N/A"}</div>
<div class="detail-meta"><strong>Category:</strong> ${job.category || "General"}</div>
<div class="detail-meta"><strong>Type:</strong> ${job.job_type || "N/A"}</div>
<div class="detail-meta"><strong>Salary:</strong> ${job.salary || "Not specified"}</div>

<div class="counter-boxes">
<div class="counter-card">
<h3>${job.views || 0}</h3>
<p>Views</p>
</div>
<div class="counter-card">
<h3>${job.likes || 0}</h3>
<p>Likes</p>
</div>
<div class="counter-card">
<h3>${job.clicks || 0}</h3>
<p>Clicks</p>
</div>
</div>

<div class="detail-section">
<h3>Job Description</h3>
<p>${job.description || "No description available."}</p>
</div>

<div class="detail-section">
<h3>Requirements</h3>
<p>${job.requirements || "Requirements not provided."}</p>
</div>

<div class="detail-section">
<h3>Application Link</h3>
<p>${job.apply_url || "No application link provided."}</p>
</div>

<div class="action-row">
<a href="${job.apply_url || "#"}" target="_blank" class="btn btn-primary">Apply Now</a>
<button class="btn btn-secondary" onclick="likeJob('${job.id || ""}')">Like Job</button>
<button class="btn btn-outline" onclick="trackClick('${job.id || ""}')">Track Click</button>
</div>

<div class="info-box">
Each user can view and like a job once, while total views, likes, and clicks are tracked.
</div>
`;
} catch (error) {
jobDetail.innerHTML = `<p>Failed to load job details.</p>`;
}
}

async function likeJob(jobId) {
alert("Like feature will connect to backend route.");
}

async function trackClick(jobId) {
alert("Click tracking will connect to backend route.");
}

document.addEventListener("DOMContentLoaded", loadJobDetail);
</script>
</body>
</html>
