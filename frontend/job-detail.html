<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Details - Job Scout Pro</title>
<link rel="stylesheet" href="style.css" />
<style>
.detail-wrapper {
max-width: 900px;
margin: 40px auto;
padding: 20px;
}

.detail-card {
background: #ffffff;
border-radius: 18px;
padding: 30px;
box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
}

.detail-card h1 {
font-size: 34px;
margin-bottom: 12px;
color: #111827;
}

.detail-meta {
color: #6b7280;
margin-bottom: 10px;
font-size: 15px;
}

.badge-verified {
display: inline-block;
margin: 8px 0 14px;
background: #dcfce7;
color: #166534;
padding: 6px 10px;
border-radius: 999px;
font-size: 12px;
font-weight: 700;
}

.detail-section {
margin-top: 24px;
}

.detail-section h3 {
margin-bottom: 10px;
color: #1f2937;
}

.action-row {
display: flex;
gap: 14px;
flex-wrap: wrap;
margin-top: 28px;
}

.info-box {
margin-top: 20px;
padding: 14px;
border-radius: 12px;
background: #eff6ff;
color: #1d4ed8;
font-size: 14px;
}

.counter-boxes {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 16px;
margin-top: 24px;
}

.counter-card {
background: #f9fafb;
padding: 18px;
border-radius: 14px;
text-align: center;
border: 1px solid #e5e7eb;
}

.counter-card h3 {
font-size: 26px;
color: #2563eb;
margin-bottom: 6px;
}

@media (max-width: 700px) {
.counter-boxes {
grid-template-columns: 1fr;
}
}
</style>
</head>
<body>
<header class="topbar">
<div class="logo-area">
<img src="assets/logo.Jobscoutphoto.jpg" alt="Job Scout Pro Logo" class="logo" />
<div>
<h1>Job Scout Pro</h1>
<p class="tagline">
Find jobs. Grow faster. Hire smarter.
</p>
</div>
</div>

<nav class="nav-links">
<a href="index.html">Home</a>
<a href="jobs.html">Jobs</a>
<a href="contact.html">Contact</a>
<a href="login.html" class="btn btn-outline">Login</a>
</nav>
</header>

<main class="detail-wrapper">
<div id="jobDetail" class="detail-card">
<p>
Loading job details...
</p>
</div>
</main>

<script>
const API_BASE = "https://job-scout-pro-production.up.railway.app/api";

function getVisitorId() {
  let visitorId = localStorage.getItem("visitorId");
  if (!visitorId) {
    visitorId = (crypto.randomUUID ? crypto.randomUUID() : "visitor-" + Date.now() + "-" + Math.random().toString(16).slice(2));
    localStorage.setItem("visitorId", visitorId);
  }
  return visitorId;
}
const jobDetail = document.getElementById("jobDetail");

function getJobId() {
const params = new URLSearchParams(window.location.search);
return params.get("id");
}

async function loadJobDetail() {
const jobId = getJobId();

if (!jobId) {
jobDetail.innerHTML = `<p>No job selected.</p>`;
return;
}

try {
const response = await fetch(API_BASE + "/jobs/" + jobId);
const data = await response.json();

const job = data.job || null;

if (!job) {
jobDetail.innerHTML = `<p>Job not found.</p>`;
return;
}

jobDetail.innerHTML = `
<h1>${job.title || "Untitled Job"}</h1>
${Number(job.is_employer_verified) === 1 ? `<div class="badge-verified">Verified Employer</div>` : ""}
<div class="detail-meta"><strong>Company:</strong> ${job.company || "N/A"}</div>
<div class="detail-meta"><strong>Location:</strong> ${job.location || "N/A"}</div>
<div class="detail-meta"><strong>Category:</strong> ${job.category || "General"}</div>
<div class="detail-meta"><strong>Type:</strong> ${job.job_type || "N/A"}</div>
<div class="detail-meta"><strong>Salary:</strong> ${job.salary || "Not specified"}</div>

<div class="counter-boxes">
<div class="counter-card">
<h3>${job.views_count || 0}</h3>
<p>Views</p>
</div>
<div class="counter-card">
<h3>${job.likes_count || 0}</h3>
<p>Likes</p>
</div>
<div class="counter-card">
<h3>${job.clicks_count || 0}</h3>
<p>Clicks</p>
</div>
</div>

<div class="detail-section">
<h3>Job Description</h3>
<p>${job.description || "No description available."}</p>
</div>

<div class="detail-section">
<h3>Requirements</h3>
<p>${job.requirements || "Requirements not provided."}</p>
</div>

<div class="detail-section">
<h3>Application Link</h3>
<p>${job.apply_url || "No application link provided."}</p>
</div>

<div class="action-row">
<a href="${job.apply_url || "#"}" target="_blank" class="btn btn-primary">Apply on WhatsApp</a>
<button class="btn btn-secondary" onclick="likeJob('${job.id || ""}')">Like Job</button>
<button class="btn btn-outline" onclick="trackClick('${job.id || ""}')">Track Click</button>
</div>

<div class="info-box">
Each user can view and like a job once, while total views, likes, and clicks are tracked.
</div>
`;
trackView(jobId);
} catch (error) {
jobDetail.innerHTML = `<p>Failed to load job details.</p>`;
}
}

async function trackView(jobId) {
  try {
    await fetch(API_BASE + "/jobs/" + jobId + "/view", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ visitorId: getVisitorId() })
    });
  } catch (error) {
  }
}

async function likeJob(jobId) {
  try {
    const response = await fetch(API_BASE + "/jobs/" + jobId + "/like", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ visitorId: getVisitorId() })
    });
    const data = await response.json();
    alert(data.message || "Job liked successfully.");
    loadJobDetail();
  } catch (error) {
    alert("Unable to like this job right now.");
  }
}

async function trackClick(jobId) {
  try {
    const response = await fetch(API_BASE + "/jobs/" + jobId + "/click", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ visitorId: getVisitorId() })
    });
    const data = await response.json();
    alert(data.message || "Job click tracked successfully.");
    loadJobDetail();
  } catch (error) {
    alert("Unable to track this click right now.");
  }
}

document.addEventListener("DOMContentLoaded", loadJobDetail);
</script>
</body>
</html>
